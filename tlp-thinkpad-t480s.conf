# TLP Configuration Additions for ThinkPad T480s
# Add these to /etc/tlp.conf or create as /etc/tlp.d/99-thinkpad-t480s.conf

# ============================================================================
# CPU settings
# ============================================================================

# CPU scaling governor
# Options: performance, powersave, ondemand, conservative
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Intel CPU energy/performance bias
# Options: performance, balance_performance, default, balance_power, power
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

# CPU boost (Intel Turbo Boost)
# 0=disable, 1=enable
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# ============================================================================
# PCIe Active State Power Management
# ============================================================================

# Options: default, performance, powersave, powersupersave
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# ============================================================================
# WiFi power management (Intel AX210)
# ============================================================================

# Options: on, off
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# ============================================================================
# Bluetooth
# ============================================================================

BLUETOOTH_ON_AC=on
BLUETOOTH_ON_BAT=off

# ============================================================================
# ThinkPad Battery Charge Thresholds
# ============================================================================

# Preserve battery health by limiting charge
# Uncomment and adjust values (0-100)
# START_CHARGE_THRESH_BAT0=75
# STOP_CHARGE_THRESH_BAT0=80

# If you have a second battery (T480s has internal + external)
# START_CHARGE_THRESH_BAT1=75
# STOP_CHARGE_THRESH_BAT1=80

# ============================================================================
# Disk settings
# ============================================================================

# Disk spin down timeout (seconds, 0=disable)
DISK_SPINDOWN_TIMEOUT_ON_AC=0
DISK_SPINDOWN_TIMEOUT_ON_BAT=30

# Disk I/O scheduler
# Options: noop, none, deadline, cfq, bfq, mq-deadline, kyber
DISK_IOSCHED_ON_AC=mq-deadline
DISK_IOSCHED_ON_BAT=mq-deadline

# ============================================================================
# Graphics (if using integrated Intel graphics)
# ============================================================================

# Intel GPU frequency scaling
# Options: low, medium, high, auto, default
# Set to empty string to use defaults, or specific values like "low", "medium", "high"
# Note: "0" is not a valid value - use empty string or remove these lines to use defaults
# INTEL_GPU_MIN_FREQ_ON_AC=
# INTEL_GPU_MIN_FREQ_ON_BAT=
# INTEL_GPU_MAX_FREQ_ON_AC=
# INTEL_GPU_MAX_FREQ_ON_BAT=
# INTEL_GPU_BOOST_FREQ_ON_AC=
# INTEL_GPU_BOOST_FREQ_ON_BAT=

# ============================================================================
# USB autosuspend
# ============================================================================

# USB autosuspend timeout (seconds, 0=disable)
USB_AUTOSUSPEND=1
USB_BLACKLIST_BTUSB=1
USB_BLACKLIST_PHONE=1
USB_BLACKLIST_PRINTER=1
USB_BLACKLIST_WWAN=1
